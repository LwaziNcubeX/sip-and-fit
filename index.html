<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/styles/home.css" />
    <title>Sip & Fit - Juice Bar</title>
  </head>
  <body>
    <nav class="navbar">
      <img src="assets/images/logo.png" alt="Sip & Fit Logo" width="50" />

      <ul class="nav-menu">
        <li><a href="/" class="nav-item">Home</a></li>
        <li><a href="/menu" class="nav-item">Menu</a></li>
        <li><a href="/about" class="nav-item">About Us</a></li>
        <li><a href="/contact" class="nav-item">Contact Us</a></li>
      </ul>

      <button class="auth-button">GET STARTED</button>
    </nav>
    <main>
      <div class="hero">
        <div>
          <h1>Lorem, ipsum dolor.</h1>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Veritatis
            rem debitis sint quos beatae possimus accusantium voluptas eligendi.
          </p>
          <div class="hero-buttons">
            <button class="hero-button-left">SHOP NOW</button>
            <button class="hero-button-right">Learn More</button>
          </div>
        </div>
        <img
          src="assets/images/Ardal Green-cropped.png"
          alt="Sip & Fit Logo"
          width="500"
        />
      </div>

      <div class="discover-section">
        <div class="discover-nav">
          <h2>Discover Our Range</h2>
          <div>
            <button class="more-products-button">
              More
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-chevron-right-icon lucide-chevron-right"
              >
                <path d="m9 18 6-6-6-6" />
              </svg>
            </button>
          </div>
        </div>
        <div class="products">
          <div class="product-item">1</div>
          <div class="product-item">2</div>
          <div class="product-item">3</div>
          <div class="product-item">4</div>
        </div>
      </div>
    </main>
  </body>
</html>
