<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/styles/contact.css" />
    <title>Contact Us</title>
  </head>
  <body>
    <nav class="navbar">
      <img src="/assets/images/logo.svg" alt="CitrusWave Logo" height="46" />

      <ul class="nav-menu">
        <li><a href="/" class="nav-item">Home</a></li>
        <li><a href="/menu/index.html" class="nav-item">Menu</a></li>
        <li><a href="/about/index.html" class="nav-item">About Us</a></li>
        <li><a href="/contact/index.html" class="nav-item">Contact Us</a></li>
      </ul>

      <button class="auth-button">
        <a href="/auth/login.html">GET STARTED</a>
      </button>
    </nav>

    <main class="contact">
      <section class="contact-form">
        <div class="contact-card">
          <div class="brand">
            <img
              src="/assets/images/logo.svg"
              alt="CitrusWave Logo"
              height="45"
            />

            <p>Send Us a Message</p>
          </div>
          <form>
            <div class="form-div">
              <label for="name"><img src="/assets/images/user.svg" /></label>
              <input id="name" type="text" placeholder="Lwazi Ncube" required />
            </div>
            <div class="form-div">
              <label for="email"><img src="/assets/images/mail.svg" /></label>
              <input
                id="email"
                type="email"
                placeholder="lwazincubex@example.com"
                required
              />
            </div>

            <div class="form-div">
              <label for="username"
                ><img src="/assets/images/user.svg"
              /></label>
              <input
                id="username"
                type="text"
                placeholder="Enter Your Name"
                required
              />
            </div>
            <div class="form-message">
              <input
                id="message"
                type="text"
                placeholder="Enter your message"
                required
              />
            </div>

            <button type="submit" class="send-button">Send Message</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
